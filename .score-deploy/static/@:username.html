<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="view-transition" content="same-origin"><meta property="og:type" content="website"><link rel="stylesheet" href="/global.css"><link rel="stylesheet" href="/styles/@:username.css"><link rel="stylesheet" href="/styles/app-header.css"><script>!function(){var t=localStorage.getItem("as-theme");if(t==="true")t="dark";if(t==="false")t="light";if(t&&["dark","light"].indexOf(t)!==-1){document.documentElement.setAttribute("data-theme",t)}}()</script></head><body><div class="profile-stack"><div class="app-header score-contents"><header><div class="app-header-stack"><a href="/" class="app-header-link"><div class="app-header-stack-2"><div class="app-header-stack-3">Libretto</div><div class="app-header-stack-4">by Allegro</div></div></a></div><div class="app-header-stack"><div class="app-header-stack-5"><div class="icon score-contents"><div class="icon-stack icon-search"></div></div><input type="search" name="q" placeholder="Search posts, writers, topics…" id="search-input"></div></div><div class="app-header-stack-6"><div id="nav-logged-out"><a href="/login" class="app-header-link-2">Get Started</a></div><div class="app-header-stack-7" id="nav-logged-in"><a href="/write" class="app-header-link-3"><div class="icon score-contents"><div class="icon-stack-2 icon-plus"></div></div>New Post</a><a href="/settings" class="app-header-link"><div class="app-header-stack-8" id="nav-avatar"></div></a></div><script>
(function() {
  function showLoggedOut() {
    var lo = document.getElementById('nav-logged-out');
    var li = document.getElementById('nav-logged-in');
    if (lo) lo.style.display = 'flex';
    if (li) li.style.display = 'none';
  }
  fetch('/auth/me', { credentials: 'same-origin' })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(user) {
      if (user && user.id) {
        var lo = document.getElementById('nav-logged-out');
        var li = document.getElementById('nav-logged-in');
        if (lo) lo.style.display = 'none';
        if (li) li.style.display = 'flex';
      } else {
        showLoggedOut();
      }
    })
    .catch(function() { showLoggedOut(); });
})();
</script></div></header></div><div class="profile-stack-2"><div id="profile-header"></div><div id="profile-posts"></div></div><script>
(function() {
  function formatDate(dateStr, format) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d)) return '';
  var opts;
  switch (format) {
    case 'short':
      opts = { month: 'short', day: 'numeric' };
      break;
    case 'long':
      opts = { year: 'numeric', month: 'long', day: 'numeric' };
      break;
    case 'full':
      opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      break;
    default:
      opts = { year: 'numeric', month: 'short', day: 'numeric' };
      break;
  }
  return d.toLocaleDateString('en-US', opts);
}
  function renderAvatarPlaceholder(container, displayName, size) {
  size = size || 72;
  var av = document.createElement('div');
  av.style.cssText = 'width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:var(--color-accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-size:' + Math.round(size * 0.39) + 'px;font-weight:500;color:var(--color-bg)';
  av.textContent = (displayName || '?')[0].toUpperCase();
  container.appendChild(av);
  return av;
}
function renderAvatarOrPlaceholder(container, avatarURL, displayName, size) {
  size = size || 72;
  if (avatarURL) {
    var img = document.createElement('img');
    img.src = avatarURL;
    img.alt = displayName || '';
    img.style.cssText = 'width:' + size + 'px;height:' + size + 'px;border-radius:50%;object-fit:cover';
    container.appendChild(img);
    return img;
  }
  return renderAvatarPlaceholder(container, displayName, size);
}

  var username = (window.location.pathname.match(/^\/@([^/]+)/) || [])[1];
  if (!username) return;

  document.title = '@' + username + ' \u2014 Libretto';

  fetch('/api/profile/' + encodeURIComponent(username))
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(p) {
      renderProfile(p);
      return fetch('/api/public/posts?author=' + encodeURIComponent(username));
    })
    .then(function(r) { return r.ok ? r.json() : []; })
    .then(renderPosts)
    .catch(function() {
      var el = document.getElementById('profile-header');
      var msg = document.createElement('p');
      msg.style.cssText = 'font-family:var(--font-sans);font-size:13px;color:var(--color-muted);';
      msg.textContent = 'Profile not found.';
      el.appendChild(msg);
    });

  function renderProfile(p) {
    var header = document.getElementById('profile-header');
    header.style.cssText = 'display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center;';

    // Avatar — uses shared utility (matches ProfileHeader Swift component)
    renderAvatarOrPlaceholder(header, p.avatarURL, p.displayName, 72);

    // Name block
    var nameBlock = document.createElement('div');
    var h2 = document.createElement('h2');
    h2.style.cssText = 'margin:0;font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--color-text)';
    h2.textContent = p.displayName || '';
    var handle = document.createElement('p');
    handle.style.cssText = 'margin:4px 0 0;font-family:var(--font-mono);font-size:13px;color:var(--color-dimmer)';
    handle.textContent = '@' + (p.username || '');
    nameBlock.appendChild(h2);
    nameBlock.appendChild(handle);
    header.appendChild(nameBlock);

    // Bio
    if (p.bio) {
      var bio = document.createElement('p');
      bio.style.cssText = 'font-family:var(--font-sans);font-size:14px;line-height:1.6;color:var(--color-muted);margin:0';
      bio.textContent = p.bio;
      header.appendChild(bio);
    }

    // Social links
    if (p.socialLinks && p.socialLinks.length > 0) {
      var linksRow = document.createElement('div');
      linksRow.style.cssText = 'display:flex;gap:12px;flex-wrap:wrap';
      p.socialLinks.forEach(function(l) {
        var label = l.platform === 'github' ? 'GitHub'
          : l.platform === 'twitter' ? 'X / Twitter'
          : l.platform === 'website' ? 'Website'
          : l.platform;
        var a = document.createElement('a');
        a.href = l.url;
        a.textContent = label;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.style.cssText = 'font-family:var(--font-sans);font-size:13px;color:var(--color-accent);text-decoration:none';
        linksRow.appendChild(a);
      });
      header.appendChild(linksRow);
    }
  }

  function renderPosts(posts) {
    var el = document.getElementById('profile-posts');
    if (!posts || posts.length === 0) {
      var msg = document.createElement('p');
      msg.style.cssText = 'font-family:var(--font-sans);font-size:13px;color:var(--color-muted);';
      msg.textContent = 'No published posts yet.';
      el.appendChild(msg);
      return;
    }
    var heading = document.createElement('h3');
    heading.style.cssText = 'font-family:var(--font-serif);font-size:20px;font-weight:600;color:var(--color-text);margin:0 0 12px';
    heading.textContent = 'Published Posts';
    el.appendChild(heading);

    posts.forEach(function(post) {
      var card = document.createElement('div');
      card.style.cssText = 'border-bottom:1px solid var(--color-border);padding:16px 0';

      var a = document.createElement('a');
      a.href = '/@' + encodeURIComponent(username) + '/' + encodeURIComponent(post.slug || '');
      a.style.cssText = 'font-family:var(--font-serif);font-size:18px;font-weight:600;color:var(--color-text);text-decoration:none';
      a.textContent = post.title || '';
      card.appendChild(a);

      if (post.publishedAt) {
        var date = document.createElement('p');
        date.style.cssText = 'margin:4px 0 0;font-family:var(--font-sans);font-size:12px;color:var(--color-muted)';
        date.textContent = formatDate(post.publishedAt, 'long');
        card.appendChild(date);
      }
      el.appendChild(card);
    });
  }
})();
</script></div></body></html>
