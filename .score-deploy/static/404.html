*, *::before, *::after {

  margin: 0;
  padding: 0;
}
[hidden] {

body {

  color: inherit;

:focus:not(:focus-visible) {

}
h1, h2, h3 {
  font-family: var(--font-serif);
  font-weight: 300;
  color: var(--color-text);
}
h1 {
  font-size: 32px;
  letter-spacing: -0.5px;
}
h2 {
  font-size: 22px;
  margin-top: 40px;
  margin-bottom: 16px;
}
h3 {
  font-size: 17px;
  margin-top: 32px;
  margin-bottom: 12px;
}
p {
  margin-top: 8px;
  margin-bottom: 8px;
}
code {
  font-family: var(--font-mono);
  font-size: 0.85em;
  background: var(--color-border);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--color-border);
}
pre {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
  overflow-x: auto;
  code {
    background: none;
    padding: 0;
    border: none;
    font-size: 12px;
  }
}
blockquote {
  border-left: 3px solid var(--color-border);
  padding: 12px 20px;
  margin: 16px 0;
  p {
    margin: 4px 0;
  }
}
hr {
  border: none;
  border-top: 1px solid var(--color-border);
  margin: 24px 0;
}
table {
  border-collapse: collapse;
  width: 100%;
  margin: 16px 0;
}
th, td {

details {
  position: relative;
}
summary {
  list-style: none;
  cursor: pointer;
  &::-webkit-details-marker {
    display: none;
  }
}

}

.theme-error {
  .theme-error-stack {
    min-height: 100vh;
    background-color: var(--color-bg);
    display: flex;
    flex-direction: column;
    flex-wrap: nowrap;
    gap: 0px;
  }
  section {
    padding-inline: 56px;
    padding-block: 120px;
    display: flex;
    flex-direction: column;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    gap: 24px;
  }
  h1 {
    animation: score-fadeIn 0.6s ease-out both;
    font-family: var(--font-serif);
    font-size: 72px;
    font-weight: 300;
    line-height: 1.1;
    color: var(--color-text);
    text-align: center;
  }
  .theme-error-text {
    animation: score-fadeIn 0.6s ease-out 0.15s both;
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 300;
    color: var(--color-text);
    text-align: center;
  }
  .theme-error-text-2 {
    animation: score-fadeIn 0.6s ease-out 0.3s both;
    max-width: 480px;
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
    color: var(--color-muted);
    text-align: center;
  }
  a {
    animation: score-fadeIn 0.6s ease-out 0.45s both;
    border-radius: 4px;
    border: 1px solid var(--color-border);
    padding-inline: 20px;
    padding-block: 10px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text);
    text-align: center;
    text-decoration: none;
    &:hover {
      background-color: var(--color-elevated);
    }
  }
  @media (max-width: 768px) {
      section {
        padding-inline: 20px;
        padding-block: 80px;
      }
      h1 {
        font-size: 56px;
      }
      .theme-error-text {
        font-size: 20px;
      }
