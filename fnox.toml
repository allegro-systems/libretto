[providers]
keychain = { type = "keychain", service = "fnox" }
infisical = { type = "infisical", project_id = "52838648-6a12-479a-bad9-6e3543df4998", environment = "prod", path = "/" }

[secrets]
INFISICAL_CLIENT_ID = { provider = "keychain", value = "infisical-client-id" }
INFISICAL_CLIENT_SECRET = { provider = "keychain", value = "infisical-client-secret" }
GITHUB_CLIENT_ID = { provider = "infisical", value = "GITHUB_CLIENT_ID" }
GITHUB_CLIENT_SECRET = { provider = "infisical", value = "GITHUB_CLIENT_SECRET" }
RESEND_API_KEY = { provider = "infisical", value = "RESEND_API_KEY" }
REVOLUT_API_KEY = { provider = "infisical", value = "REVOLUT_API_KEY" }
REVOLUT_WEBHOOK_SECRET = { provider = "infisical", value = "REVOLUT_WEBHOOK_SECRET" }
REVOLUT_SANDBOX = { provider = "infisical", value = "REVOLUT_SANDBOX" }
